<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login - Max Tour & Safari</title>
  <link rel="icon" type="image/png" href="../img/favicon.jpeg" />
  <link rel="stylesheet" href="../css/admin-login.css" />
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="login-shell">
    <div class="login-overlay"></div>

    <div class="login-card">
      <div class="login-brand">
        <img src="../img/next.jpeg" alt="Max Tour & Safari Logo" />
        <div>
          <h1>Max Tour & Safari</h1>
          <p>Admin Access Portal</p>
        </div>
      </div>

      <div class="login-copy">
        <span class="login-tag">Secure Area</span>
        <h2>Welcome Back</h2>
        <p>
          Sign in to manage bookings, packages, messages, and agent applications.
        </p>
      </div>

      <form id="adminLoginForm" class="login-form">
        <div class="form-group">
          <label for="username">Username</label>
          <div class="input-wrap">
            <i data-lucide="user-round"></i>
            <input
              type="text"
              id="username"
              placeholder="Enter username"
              autocomplete="username"
              required
            />
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrap">
            <i data-lucide="lock-keyhole"></i>
            <input
              type="password"
              id="password"
              placeholder="Enter password"
              autocomplete="current-password"
              required
            />
            <button type="button" class="toggle-password" id="togglePassword" aria-label="Show password">
              <i data-lucide="eye"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="login-btn">Login to Admin Panel</button>
        <p id="loginMessage" class="login-message"></p>
      </form>
    </div>
  </div>

  <script src="../js/admin-login.js"></script>
</body>
</html>
